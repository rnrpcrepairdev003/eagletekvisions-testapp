[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ─────────────────────────────────────────────
# CACHE HEADERS
# ─────────────────────────────────────────────

# Hashed JS/CSS/fonts from Next.js build — immutable forever
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Optimised images from Next.js image endpoint
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# Logo & mascot — immutable (filenames never change)
[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/Website-logo.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/eagle-mascot.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Company video — cache 24h, serve stale for 7 days while revalidating
[[headers]]
  for = "/company-video.mp4"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# HTML pages — Netlify CDN caches 1 hour, browser always checks for fresh
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

